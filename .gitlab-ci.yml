stages:
  - validate
  - build
  - backup_db
  - deploy

variables:
  NODE_VERSION: "20"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

.node_setup: &node_setup
  image: node:${NODE_VERSION}-alpine
  before_script:
    - npm ci --prefer-offline

typecheck:
  <<: *node_setup
  stage: validate
  script:
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  <<: *node_setup
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

backup_database:
  stage: backup_db
  image: postgres:16-alpine
  script:
    - export TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    - export BACKUP_FILE="e-biblio_backup_${TIMESTAMP}.sql"
    - echo "Sauvegarde de la base de donnees de dev..."
    - pg_dump "$DEV_DATABASE_URL" --no-owner --no-privileges --clean --if-exists -f "$BACKUP_FILE"
    - echo "Backup cree - $BACKUP_FILE"
    - echo "Restauration vers la base de donnees de production..."
    - psql "$PROD_DATABASE_URL" -f "$BACKUP_FILE"
    - echo "Base de donnees de production mise a jour avec les donnees de dev."
  artifacts:
    paths:
      - e-biblio_backup_*.sql
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy_to_replit:
  stage: deploy
  image: alpine:latest
  needs:
    - backup_database
    - build
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$REPLIT_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H ssh.replit.com >> ~/.ssh/known_hosts 2>/dev/null || true
    - git config --global user.email "gitlab-ci@e-biblio.com"
    - git config --global user.name "GitLab CI/CD"
  script:
    - echo "Synchronisation vers Replit..."
    - git remote add replit "$REPLIT_GIT_URL" || git remote set-url replit "$REPLIT_GIT_URL"
    - git push replit HEAD:main --force
    - echo "Code synchronise avec Replit. Le deploiement sera declenche automatiquement."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: $REPLIT_APP_URL
